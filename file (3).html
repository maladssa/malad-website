<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملدّ | التسجيل</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="لوقو ملدّ">
    </div>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="services.html">الخدمات</a>
        <a href="portfolio.html">الأعمال</a>
        <a href="register.html">التسجيل</a>
    </nav>
</header>

<section class="content">
    <h2>تسجيل المصورين</h2>

    <form>
        <input type="text" placeholder="الاسم الكامل">
        <input type="text" placeholder="رقم الجوال">
        <input type="text" placeholder="سناب/انستقرام">
        <select>
            <option>مجال التصوير</option>
            <option>إيفنتات</option>
            <option>عرايس</option>
            <option>مطاعم</option>
            <option>منتجات</option>
            <option>بورتريه</option>
        </select>
        <button>إرسال</button>
    </form>

    <h2 style="margin-top:50px;">تسجيل العملاء (طلب تصوير)</h2>

    <form>
        <input type="text" placeholder="الاسم">
        <input type="text" placeholder="رقم الجوال">
        <input type="text" placeholder="المكان">
        <select>
            <option>نوع التصوير</option>
            <option>إيفنت</option>
            <option>عرايس</option>
            <option>مطاعم</option>
            <option>منتجات</option>
            <option>بورتريه</option>
        </select>
        <textarea rows="4" placeholder="ملاحظات إضافية"></textarea>
        <button>إرسال</button>
    </form>
</section>

<footer>
    © جميع الحقوق محفوظة لمؤسسة ملدّ
</footer>

</body>
</html>
